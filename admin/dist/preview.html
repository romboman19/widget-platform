<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* Clean white background */  
    body {
      background: #ffffff;
      min-height: 100vh;
      position: relative;
    }
    
    /* Center indicator for mobile/desktop */  
    .center-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 50%;
      pointer-events: none;
    }
    
    /* Device frame indicator */  
    .device-indicator {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #f3f4f6;
      color: #9ca3af;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="center-marker"></div>
  <div class="device-indicator" id="device-indicator">Desktop</div>

  <script>
    // Get widget config from URL params (base64 encoded JSON)
    const params = new URLSearchParams(window.location.search);
    const configParam = params.get('config');
    const device = params.get('device') || 'desktop';
    
    // Update device indicator
    document.getElementById('device-indicator').textContent = 
      device === 'mobile' ? 'Mobile (375×667)' : 'Desktop';
    
    // Parse config
    let widgetConfig = null;
    
    if (configParam) {
      try {
        const jsonStr = atob(configParam);
        widgetConfig = JSON.parse(jsonStr);
      } catch (e) {
        console.error('Failed to parse config:', e);
      }
    }
    
    // Fallback: check for global preview data
    if (!widgetConfig && window.__WIDGET_PREVIEW__) {
      widgetConfig = window.__WIDGET_PREVIEW__;
    }
    
    if (widgetConfig) {
      // Inject preview config for w.js
      window.__WIDGET_PREVIEW__ = widgetConfig;
      
      // Force widget to show immediately (no triggers)
      if (widgetConfig.widgets && widgetConfig.widgets[0]) {
        const widget = widgetConfig.widgets[0];
        // Disable triggers for preview
        widget.triggers = null;
        // Ensure it's enabled
        widget.enabled = true;
      }
      
      // Load w.js
      const script = document.createElement('script');
      script.src = '/w.js?preview=1';
      script.async = true;
      script.onerror = () => {
        console.error('Failed to load w.js');
      };
      document.head.appendChild(script);
    } else {
      document.body.innerHTML = '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#9ca3af;text-align:center;">' +
        '<p>No widget config</p>' +
        '</div>';
    }
    
    // Listen for config updates from parent
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'UPDATE_WIDGET_CONFIG') {
        const newConfig = event.data.config;
        
        // Update global config
        window.__WIDGET_PREVIEW__ = newConfig;
        
        // Remove existing widgets
        document.querySelectorAll('[data-widget-id]').forEach(el => el.remove());
        
        // Re-init w.js if loaded, otherwise it will pick up new config on load
        if (window.__WIDGET_REINIT__) {
          window.__WIDGET_REINIT__();
        } else {
          // Reload page with new config
          const newUrl = new URL(window.location.href);
          const configStr = JSON.stringify(newConfig);
          newUrl.searchParams.set('config', btoa(configStr));
          window.location.href = newUrl.toString();
        }
      }
    });
  </script>
</body>
</html>
