<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      min-height: 100vh;
      position: relative;
      background: #f5f5f5;
    }
    
    /* Site screenshot as background */  
    #site-screenshot {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    
    /* Fallback when no screenshot */  
    .no-screenshot {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      text-align: center;
      padding: 20px;
    }
    
    .no-screenshot h2 {
      font-size: 24px;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .no-screenshot p {
      font-size: 14px;
      opacity: 0.7;
    }
    
    /* Loading indicator */  
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-size: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.9);
      padding: 12px 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div id="loading">Завантаження...</div>
  <div id="site-container"></div>

  <script>
    // Get params from URL
    const params = new URLSearchParams(window.location.search);
    const configParam = params.get('config');
    const device = params.get('device') || 'desktop';
    const screenshotUrl = params.get('screenshot');
    
    const container = document.getElementById('site-container');
    document.getElementById('loading').style.display = 'none';
    
    // Show screenshot or fallback
    if (screenshotUrl) {
      const img = document.createElement('img');
      img.id = 'site-screenshot';
      img.src = screenshotUrl;
      img.alt = 'Site preview';
      img.onerror = () => {
        // Fallback on error
        showFallback();
      };
      container.appendChild(img);
    } else {
      showFallback();
    }
    
    function showFallback() {
      container.innerHTML = `
        <div class="no-screenshot">
          <h2>🌐 Ваш сайт</h2>
          <p>Скриншот сайту ще не створено<br/>Збережіть сайт спочатку</p>
        </div>
      `;
    }
    
    // Parse and inject widget config
    let widgetConfig = null;
    
    if (configParam) {
      try {
        const jsonStr = decodeURIComponent(escape(atob(configParam)));
        widgetConfig = JSON.parse(jsonStr);
      } catch (e) {
        console.error('Failed to parse config:', e);
      }
    }
    
    if (widgetConfig) {
      // Disable triggers for preview - show immediately
      if (widgetConfig.widgets && widgetConfig.widgets[0]) {
        widgetConfig.widgets[0].triggers = null;
        widgetConfig.widgets[0].enabled = true;
      }
      
      window.__WIDGET_PREVIEW__ = widgetConfig;
      
      // Load w.js
      const script = document.createElement('script');
      script.src = '/w.js?preview=1';
      script.async = true;
      script.onerror = () => console.error('Failed to load w.js');
      document.head.appendChild(script);
    }
    
    // Listen for config updates
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'UPDATE_WIDGET_CONFIG') {
        window.__WIDGET_PREVIEW__ = event.data.config;
        if (window.__WIDGET_REINIT__) {
          window.__WIDGET_REINIT__();
        }
      }
    });
  </script>
</body>
</html>
