<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: #ffffff;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <script>
    // Get widget config from URL
    const params = new URLSearchParams(window.location.search);
    const configParam = params.get('config');
    
    if (configParam) {
      try {
        const jsonStr = decodeURIComponent(escape(atob(configParam)));
        const widgetConfig = JSON.parse(jsonStr);
        
        // Disable triggers - show immediately
        if (widgetConfig.widgets && widgetConfig.widgets[0]) {
          widgetConfig.widgets[0].triggers = null;
          widgetConfig.widgets[0].enabled = true;
        }
        
        window.__WIDGET_PREVIEW__ = widgetConfig;
        
        // Load w.js
        const script = document.createElement('script');
        script.src = '/w.js?preview=1';
        script.async = true;
        document.head.appendChild(script);
      } catch (e) {
        console.error('Failed to load widget:', e);
      }
    }
    
    // Listen for updates from editor
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'UPDATE_WIDGET_CONFIG') {
        window.__WIDGET_PREVIEW__ = event.data.config;
        if (window.__WIDGET_REINIT__) {
          window.__WIDGET_REINIT__();
        }
      }
    });
  </script>
</body>
</html>
