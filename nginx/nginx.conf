worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Hide nginx version
    server_tokens off;

    # Body size limits — prevent large payloads
    client_max_body_size 64k;
    client_body_buffer_size 16k;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=analytics:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=form:10m rate=2r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=widget_config:10m rate=30r/m;

    # Map to extract Origin domain for validation
    # $cors_ok will be "1" if Origin matches allowed patterns
    map $http_origin $cors_ok {
        default 0;
        "~^https?://(.*\.)?top-trig\.store$" 1;
        "~^https?://(.*\.)?hunter\.rv\.ua$" 1;
        "~^https?://(.*\.)?huntervua\.pp\.ua$" 1;
        # Add more allowed domains here:
        # "~^https?://(.*\.)?example\.com$" 1;
    }

    map $cors_ok $cors_origin {
        1 $http_origin;
        default "";
    }

    # Separate map for admin — restrict to specific IPs or local
    # Uncomment geo block below to restrict admin access by IP
    # geo $admin_allowed {
    #     default 0;
    #     192.168.0.0/16 1;   # Local network
    #     10.0.0.0/8 1;       # Docker/VPN
    #     YOUR.PUBLIC.IP/32 1; # Your public IP
    # }

    server {
        listen 80;
        server_name _;

        # ──── SECURITY HEADERS (global) ────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ──── Widget JS — public CDN-like endpoint ────
        location = /w.js {
            alias /usr/share/nginx/widget/w.js;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET";
            add_header Content-Type "application/javascript";
            add_header X-Content-Type-Options "nosniff" always;
            # Subresource Integrity is handled on the embedding side
        }

        # ──── Widget config — public but rate-limited, CORS validated ────
        location /api/widget/ {
            limit_req zone=widget_config burst=10 nodelay;

            # CORS: allow only registered site domains
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET" always;
            add_header Vary "Origin" always;
            add_header X-Content-Type-Options "nosniff" always;

            proxy_pass http://api:3000/api/widget/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──── Analytics track — public, rate-limited, CORS validated ────
        location = /api/analytics/track {
            limit_req zone=analytics burst=20 nodelay;
            limit_req_status 429;

            # Only allow POST
            limit_except POST OPTIONS {
                deny all;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Vary "Origin" always;
            add_header X-Content-Type-Options "nosniff" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            proxy_pass http://api:3000/api/analytics/track;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──── Form submit — public, strict rate limit, CORS validated ────
        location = /api/analytics/form {
            limit_req zone=form burst=3 nodelay;
            limit_req_status 429;

            # Only allow POST
            limit_except POST OPTIONS {
                deny all;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Vary "Origin" always;
            add_header X-Content-Type-Options "nosniff" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            proxy_pass http://api:3000/api/analytics/form;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──── Auth login — strict rate limit against brute force ────
        location = /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://api:3000/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──── Protected API — only from admin panel, no external CORS ────
        location /api/ {
            # No CORS headers here — admin SPA is same-origin
            proxy_pass http://api:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──── Admin SPA — optionally restrict by IP ────
        location / {
            # Uncomment to restrict admin access by IP:
            # if ($admin_allowed = 0) { return 403; }

            proxy_pass http://admin:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CSP for admin panel
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ──── Block common attack patterns ────
        location ~ /\. { deny all; }
        location ~ \.(sql|bak|config|env|git)$ { deny all; }
    }
}
