<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }
    .header .badge {
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .placeholder {
      text-align: center;
      color: #6b7280;
    }
    .placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .placeholder h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .placeholder p {
      font-size: 14px;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Widget Preview</h1>
    <span class="badge">Preview Mode</span>
  </div>
  <div class="content">
    <div class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="9" y1="9" x2="15" y2="9" />
        <line x1="9" y1="13" x2="15" y2="13" />
        <line x1="9" y1="17" x2="11" y2="17" />
      </svg>
      <h2>Preview Ready</h2>
      <p>This page is ready to display widget preview. The widget configuration will be loaded via postMessage from the editor.</p>
    </div>
  </div>

  <script src="w.js?preview=1"></script>
</body>
</html>
